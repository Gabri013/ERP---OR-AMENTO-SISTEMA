services:
  - type: web
    name: erp-cozinca-api
    env: node
    region: oregon
    plan: free
    buildCommand: cd api-server && npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: cd api-server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://erp-orcamento-sistema.vercel.app
      - key: CORS_ORIGIN
        value: https://erp-orcamento-sistema.vercel.app
      - key: REDIS_URL
        sync: false
      - key: REDIS_TOKEN
        sync: false
      - key: PORT
        value: 3001
