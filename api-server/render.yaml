services:
  - type: web
    name: erp-cozinca-api
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        value: "REPLACE_WITH_NEON_POOLED_DATABASE_URL"
      - key: DIRECT_URL
        value: "REPLACE_WITH_NEON_DIRECT_URL"
      - key: JWT_SECRET
        value: "REPLACE_WITH_STRONG_SECRET"
      - key: JWT_EXPIRES_IN
        value: "8h"
      - key: REFRESH_TOKEN_EXPIRES_IN
        value: "7d"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: FRONTEND_URL
        value: "https://erp-orcamento-sistema.vercel.app"
      - key: CORS_ORIGIN
        value: "https://erp-orcamento-sistema.vercel.app"
