services:
  - type: web
    name: erp-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: erp-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: erp-db
    databaseName: erp
    user: erp_user
